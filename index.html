<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Obra Estoque V3</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
</head>

<body>

<div class="app">

    <header class="topo">
        <div>
            <h1>🏗️ Obra Estoque</h1>
            <p class="subtitulo">Controle inteligente de materiais</p>
        </div>

        <div id="statusConexao" class="status">
            🟢 Online
        </div>
    </header>

    <section class="dashboard">

        <div class="cardDash">
            <span>Pendentes</span>
            <strong id="totalPendentes">0</strong>
        </div>

        <div class="cardDash">
            <span>Hoje</span>
            <strong id="movHoje">0</strong>
        </div>

        <div class="cardDash">
            <span>Última Sync</span>
            <strong id="ultimaSync">--:--</strong>
        </div>

    </section>

    <section class="bloco">

        <label>🏗️ Selecionar Obra</label>

        <select id="obraSelect"></select>

    </section>

    <section class="bloco">

        <label>🔎 Buscar Material</label>

        <input
            type="text"
            id="buscaMaterial"
            placeholder="Digite código ou descrição..."
            autocomplete="off"
        >

        <div id="resultadoBusca"></div>

    </section>

    <section id="materialCard" class="materialCard hidden">

        <div class="materialTopo">
            <h2 id="materialTitulo">Material</h2>
            <span id="materialUnidade">UN</span>
        </div>

        <p id="materialCodigo"></p>

    </section>

    <section id="formMovimentacao" class="hidden">

        <div class="tipoContainer">

            <button class="tipoBtn entrada active" onclick="selecionarTipo('E')">
                ➕ Entrada
            </button>

            <button class="tipoBtn saida" onclick="selecionarTipo('S')">
                ➖ Saída
            </button>

        </div>

        <input type="hidden" id="tipoMov" value="E">

        <div class="grid">

            <div>
                <label>Quantidade</label>
                <input type="number" id="quantidade">
            </div>

            <div>
                <label>Preço Unit.</label>
                <input type="number" id="preco">
            </div>

        </div>

        <label>Observação</label>

        <textarea id="obs"></textarea>

        <button class="btnSalvar" onclick="salvarMovimentacao()">
            💾 Salvar Movimentação
        </button>

    </section>

    <section class="historicoBox">

        <h2>🕒 Histórico Recente</h2>

        <div id="historico"></div>

    </section>

</div>

<script src="app.js"></script>

</body>
</html>
